<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
</head>
<body>

<h1>Contact Us</h1>

<form>

Name:<br>
<input type="text" pattern="[A-Za-z ]+" title="Enter only letters" required><br><br>

Mobile Number:<br>
<input type="tel" pattern="[0-9]{10}" title="Enter 10 digit mobile number"  required><br><br>

Type of Communication:<br>
<select required>
<option value="">Select</option>
<option>Sales</option>
<option>Service</option>
<option>Enquiry</option>
<option>Advertisement</option>
<option>Complaint</option>
</select><br><br>

Description:<br>
<textarea rows="4" cols="50" minlength="10" required></textarea><br><br>

<input type="submit" value="Submit">

</form>

<br>
<a href="index.html">Back to Home</a>

</body>
</html>
